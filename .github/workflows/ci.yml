name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest
          bb: latest
          clj-kondo: latest

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-deps-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Cache clj-kondo
        uses: actions/cache@v4
        with:
          path: .clj-kondo/.cache
          key: ${{ runner.os }}-kondo-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-kondo-

      - name: Lint
        run: bb lint

      - name: Test
        run: bb test
